# COM762 CW2 — 5x5 Grid World
#
# Layout (1-indexed for readability):
#   1   2   3   4   5
# 1 [ ] [ ] [ ] [ ] [ ]
# 2 [S] [ ] [ ] [J] [ ]
# 3 [ ] [ ] [X] [X] [X]
# 4 [ ] [ ] [X] [*] [ ]
# 5 [ ] [ ] [ ] [ ] [G]
#
# S = Start, G = Goal, J = Jump, X = Wall, * = Jump destination

grid_size: 5

tile_types:
  empty:
    reward: -1.0
    passable: true
  wall:
    passable: false
    reward: -1.0
  goal:
    reward: 10.0
    passable: true
    terminal: true
  jump:
    reward: 5.0
    passable: true
    redirect: [3, 3]   # teleport destination (0-indexed)

# Agent start position (0-indexed)
start: [1, 0]

# Tile placements (0-indexed row,col) — unlisted cells default to 'empty'
tiles:
  "1,3": jump
  "4,4": goal
  "2,2": wall
  "2,3": wall
  "2,4": wall
  "3,2": wall
